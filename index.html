<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rengøringsplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --ink: #1A1A18;
    --muted: #7A7A72;
    --accent-bath: #2C5F6E;
    --accent-kitchen: #5C3D2E;
    --check: #3AAF7A;
    --border: #E2DDD6;
    --tab-h: 56px;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    padding: 36px 24px 0;
    text-align: center;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 7vw, 42px);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  header p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* TABS */
  .tabs {
    display: flex;
    margin: 28px 20px 0;
    background: var(--border);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    height: var(--tab-h);
    border: none;
    background: transparent;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tab-btn .icon { font-size: 18px; }
  .tab-btn.active {
    color: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }
  .tab-btn.active[data-tab="bath"] { background: var(--accent-bath); }
  .tab-btn.active[data-tab="kitchen"] { background: var(--accent-kitchen); }

  /* PROGRESS */
  .progress-wrap {
    margin: 20px 20px 0;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-bar-fill.bath { background: var(--accent-bath); }
  .progress-bar-fill.kitchen { background: var(--accent-kitchen); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 400;
  }

  /* PANELS */
  .panel { display: none; padding: 16px 20px 100px; }
  .panel.active { display: block; }

  /* CHECKLIST */
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  .check-item {
    background: var(--card);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .check-item label {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }
  .check-item input[type="checkbox"] { display: none; }

  .custom-check {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .custom-check svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }

  .check-item input:checked ~ .task-label { color: var(--muted); text-decoration: line-through; }

  /* Bath active color */
  #panel-bath .check-item input:checked + .custom-check {
    background: var(--accent-bath);
    border-color: var(--accent-bath);
  }
  #panel-bath .check-item input:checked + .custom-check svg { opacity: 1; transform: scale(1); }
  #panel-bath .check-item:has(input:checked) { border-color: #C8DDE2; opacity: 0.85; }

  /* Kitchen active color */
  #panel-kitchen .check-item input:checked + .custom-check {
    background: var(--accent-kitchen);
    border-color: var(--accent-kitchen);
  }
  #panel-kitchen .check-item input:checked + .custom-check svg { opacity: 1; transform: scale(1); }
  #panel-kitchen .check-item:has(input:checked) { border-color: #D9C9C0; opacity: 0.85; }

  .task-label {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--ink);
    transition: color 0.2s;
  }

  /* COMPLETION BANNER */
  .done-banner {
    display: none;
    margin-top: 16px;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    font-weight: 500;
    font-size: 15px;
    animation: popIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  .done-banner.bath { background: #D8EEF2; color: var(--accent-bath); }
  .done-banner.kitchen { background: #EDE0D9; color: var(--accent-kitchen); }
  .done-banner .big { font-family: 'DM Serif Display', serif; font-size: 28px; display: block; margin-bottom: 4px; }

  /* RESET BUTTON */
  .reset-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 16px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:active { background: var(--bg); }

  /* ROTATION BANNER */
  .rotation-banner {
    margin: 16px 20px 0;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .rotation-week {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .rotation-row {
    display: flex;
    gap: 10px;
  }
  .rotation-person {
    flex: 1;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .rotation-person.bath { background: #D8EEF2; }
  .rotation-person.kitchen { background: #EDE0D9; }
  .rotation-person .rp-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .rotation-person .rp-zone {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
  }
  .rotation-person .rp-icon { font-size: 18px; margin-bottom: 4px; }
  .rotation-together {
    background: #F0EDE8;
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  /* FIREWORKS */
  #fireworks-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #fireworks-canvas.active { opacity: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<canvas id="fireworks-canvas"></canvas>

<script>
  // FIREWORKS
  const canvas = document.getElementById('fireworks-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animFrame = null;
  let fwTimeout = null;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function randomColor() {
    const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9A3C','#C77DFF','#FF6FC8','#00D2FF','#FFFFFF'];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function createBurst(x, y) {
    const count = 80 + Math.floor(Math.random() * 40);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: randomColor(),
        size: 2 + Math.random() * 3,
        gravity: 0.08 + Math.random() * 0.04,
        decay: 0.012 + Math.random() * 0.008,
        trail: []
      });
    }
  }

  function launchRandom() {
    const x = canvas.width * (0.2 + Math.random() * 0.6);
    const y = canvas.height * (0.1 + Math.random() * 0.45);
    createBurst(x, y);
  }

  function animateFireworks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.alpha > 0.02);
    for (const p of particles) {
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 5) p.trail.shift();

      // Trail
      for (let t = 0; t < p.trail.length - 1; t++) {
        const ta = (t / p.trail.length) * p.alpha * 0.4;
        ctx.beginPath();
        ctx.moveTo(p.trail[t].x, p.trail[t].y);
        ctx.lineTo(p.trail[t+1].x, p.trail[t+1].y);
        ctx.strokeStyle = p.color;
        ctx.globalAlpha = ta;
        ctx.lineWidth = p.size * 0.6;
        ctx.stroke();
      }

      // Particle
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.98;
      p.alpha -= p.decay;
    }
    ctx.globalAlpha = 1;

    if (particles.length > 0 || canvas.classList.contains('active')) {
      animFrame = requestAnimationFrame(animateFireworks);
    }
  }

  let burstInterval = null;

  function startFireworks() {
    canvas.classList.add('active');
    particles = [];
    if (animFrame) cancelAnimationFrame(animFrame);
    if (burstInterval) clearInterval(burstInterval);
    if (fwTimeout) clearTimeout(fwTimeout);

    // Fire multiple bursts
    launchRandom();
    setTimeout(launchRandom, 300);
    setTimeout(launchRandom, 600);
    setTimeout(launchRandom, 900);
    setTimeout(launchRandom, 1200);

    burstInterval = setInterval(() => {
      launchRandom();
    }, 700);

    animateFireworks();

    fwTimeout = setTimeout(() => {
      clearInterval(burstInterval);
      burstInterval = null;
      // Let remaining particles fade out
      setTimeout(() => {
        canvas.classList.remove('active');
        particles = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 2000);
    }, 4000);
  }

  // ROTATION LOGIC
  // Runde 1: 10. maj 2025 — alle sammen
  // Runde 2: 23. maj — Mathias: bad, Ost: køkken
  // Runde 3: 6. juni  — Robert: bad, Mathias: køkken
  // Runde 4: 20. juni — Ost: bad, Robert: køkken
  // Gentager fra runde 2 (3-ugers cyklus)

  const ROUND1 = new Date('2025-05-10');
  const ROUND2 = new Date('2025-05-23');
  const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;

  const ROTATION = [
    { bath: 'Mathias', kitchen: 'Ost' },
    { bath: 'Robert',  kitchen: 'Mathias' },
    { bath: 'Ost',     kitchen: 'Robert' },
  ];

  function getCurrentRound() {
    const now = new Date();
    if (now < ROUND2) return 'together';
    const weeksSinceRound2 = Math.floor((now - ROUND2) / TWO_WEEKS);
    return ROTATION[weeksSinceRound2 % 3];
  }

  function getWeekLabel() {
    const now = new Date();
    const start = new Date(now);
    start.setDate(now.getDate() - now.getDay() + 1); // Monday
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    const fmt = d => d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' });
    return `${fmt(start)} - ${fmt(end)}`;
  }

  function renderRotation() {
    const banner = document.getElementById('rotation-banner');
    const round = getCurrentRound();
    const weekLabel = getWeekLabel();

    if (round === 'together') {
      banner.innerHTML = `
        <div class="rotation-week">Uge · ${weekLabel}</div>
        <div class="rotation-together">🧹 Første rengøring — alle gør rent sammen lørdag d. 10. maj</div>
      `;
    } else {
      banner.innerHTML = `
        <div class="rotation-week">Uge · ${weekLabel}</div>
        <div class="rotation-row">
          <div class="rotation-person bath">
            <span class="rp-icon">🚿</span>
            <span class="rp-name">${round.bath}</span>
            <span class="rp-zone">Badeværelse</span>
          </div>
          <div class="rotation-person kitchen">
            <span class="rp-icon">🍳</span>
            <span class="rp-name">${round.kitchen}</span>
            <span class="rp-zone">Køkken og stue</span>
          </div>
        </div>
      `;
    }
  }

  renderRotation();

  let activeTab = 'bath';

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    renderProgress(tab);
  }

  function update(tab) {
    renderProgress(tab);
    const boxes = document.querySelectorAll(`#list-${tab} input[type="checkbox"]`);
    const total = boxes.length;
    const checked = [...boxes].filter(b => b.checked).length;
    const done = checked === total;

    const wasHidden = document.getElementById(`done-${tab}`).style.display === 'none' || document.getElementById(`done-${tab}`).style.display === '';
    document.getElementById(`done-${tab}`).style.display = done ? 'block' : 'none';
    document.getElementById(`reset-${tab}`).style.display = checked > 0 ? 'block' : 'none';
    if (done && wasHidden) startFireworks();
  }

  function renderProgress(tab) {
    const boxes = document.querySelectorAll(`#list-${tab} input[type="checkbox"]`);
    const total = boxes.length;
    const checked = [...boxes].filter(b => b.checked).length;
    const pct = Math.round((checked / total) * 100);

    const fill = document.getElementById('progress-fill');
    fill.style.width = pct + '%';
    fill.className = `progress-bar-fill ${tab}`;
    document.getElementById('progress-text').textContent = `${checked} af ${total} opgaver`;
    document.getElementById('progress-pct').textContent = pct + '%';
  }

  function reset(tab) {
    document.querySelectorAll(`#list-${tab} input[type="checkbox"]`).forEach(b => b.checked = false);
    document.getElementById(`done-${tab}`).style.display = 'none';
    document.getElementById(`reset-${tab}`).style.display = 'none';
    renderProgress(tab);
  }

  // Init
  renderProgress('bath');
</script>
</body>
</html>
